<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#123c2a">
<title>Ameya Games — Salle de jeux</title>
<meta name="apple-mobile-web-app-title" content="Ameya Games">
<style>
:root{
  --felt:#1b5137; --felt-dark:#123c2a; --felt-line:#2a6b4a;
  --ivory:#f4efe4; --ivory-2:#eae3d2; --ink:#16241d;
  --brass:#cba14a; --brass-deep:#a67f2e; --shadow:rgba(9,26,18,.45);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;min-height:100%}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  background:radial-gradient(120% 80% at 50% -10%, #2a6b4a 0%, var(--felt) 42%, var(--felt-dark) 100%);
  background-attachment:fixed;
  color:var(--ivory); -webkit-font-smoothing:antialiased;
  padding:calc(env(safe-area-inset-top) + 22px) 16px calc(env(safe-area-inset-bottom) + 40px);
}
.wrap{max-width:900px;margin:0 auto}

/* Header */
.head{text-align:center;margin-bottom:6px}
.logo{display:inline-flex;align-items:center;gap:12px}
.logo .die{
  width:34px;height:34px;border-radius:9px;background:var(--ivory);position:relative;
  box-shadow:inset 0 -3px 0 rgba(0,0,0,.12), 0 6px 14px rgba(0,0,0,.3);transform:rotate(-8deg)
}
.logo .die::before,.logo .die::after{content:"";position:absolute;width:6px;height:6px;border-radius:50%;background:var(--ink)}
.logo .die::before{top:7px;left:7px}.logo .die::after{bottom:7px;right:7px}
h1{margin:0;font-size:30px;font-weight:800;letter-spacing:.16em;text-transform:uppercase}
h1 .g{color:var(--brass)}
.tagline{margin:10px 0 0;color:#bcd6c6;font-size:14px;letter-spacing:.02em}

/* Filter chips */
.filters{display:flex;gap:8px;justify-content:center;margin:22px 0 18px;flex-wrap:wrap}
.chip{
  padding:9px 16px;border-radius:999px;background:rgba(255,255,255,.06);
  border:1.5px solid var(--felt-line);color:#d9ecdf;font-weight:700;font-size:13px;cursor:pointer
}
.chip.on{background:var(--brass);color:#2a2007;border-color:var(--brass)}

/* Grid */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(158px,1fr));gap:14px}
.card{
  position:relative;display:flex;flex-direction:column;gap:8px;
  background:var(--ivory);color:var(--ink);border-radius:18px;padding:16px 15px 15px;
  box-shadow:0 14px 30px var(--shadow), inset 0 1px 0 #fff;
  border:0;text-align:left;text-decoration:none;cursor:pointer;
  transition:transform .12s ease, box-shadow .12s ease;
  overflow:hidden;
}
.card::before{content:"";position:absolute;top:0;left:0;right:0;height:5px;background:var(--accent,#cba14a)}
.card.playable:active{transform:translateY(2px)}
.card.soon{opacity:.62;cursor:default}
.card .emoji{font-size:34px;line-height:1;margin-top:4px}
.card .name{font-size:18px;font-weight:800;letter-spacing:-.01em}
.card .fac{font-size:11.5px;color:#8a978d;font-style:italic;margin-top:-4px}
.card .desc{font-size:12.5px;color:#54655b;line-height:1.4;flex:1}
.card .meta{display:flex;gap:6px;flex-wrap:wrap;margin-top:2px}
.tag{font-size:10.5px;font-weight:700;color:#4a5b50;background:#e7e0cf;padding:3px 8px;border-radius:999px}
.status{
  margin-top:6px;align-self:flex-start;font-size:12px;font-weight:800;
  padding:6px 12px;border-radius:999px;letter-spacing:.02em
}
.status.play{background:var(--felt);color:var(--ivory)}
.status.wait{background:#efe7d2;color:#9a7b30;border:1px solid #e2d5b0}
.card.big{grid-column:1 / -1;background:linear-gradient(120deg,#173f2b,#1f5a3c);color:var(--ivory);
  border:1px solid var(--brass)}
.card.big .name{color:var(--ivory)}
.card.big .fac{color:#bcd6c6}
.card.big .desc{color:#cfe3d6}
.card.big::before{background:linear-gradient(90deg,#e7c15a,var(--brass))}
.card.big .tag{background:rgba(255,255,255,.1);color:#e6f2ea}

.section-t{grid-column:1/-1;font-size:11px;letter-spacing:.16em;text-transform:uppercase;
  color:#9fc0ad;font-weight:800;margin:10px 2px 0}
.foot{text-align:center;color:#6f8a7c;font-size:11px;margin-top:26px;letter-spacing:.04em}
.hint{text-align:center;color:#9fc0ad;font-size:12.5px;margin:18px auto 0;max-width:520px;line-height:1.5}
</style>
</head>
<body>
<div class="wrap">
  <div class="head">
    <div class="logo"><span class="die"></span><h1>Ameya <span class="g">Games</span></h1></div>
    <p class="tagline">La salle de jeux — choisis un jeu et c'est parti 🎲</p>
  </div>

  <div class="filters">
    <button class="chip on" data-f="all">Tous</button>
    <button class="chip" data-f="play">Jouables</button>
    <button class="chip" data-f="soon">Bientôt</button>
  </div>

  <div class="grid" id="grid"></div>

  <p class="hint" id="hint">Sept jeux prêts : Yam's, Mots de code, La Mine, Les Rues, Tutti, Le Trio, Sixième carte.
    Suite : Bazar, Merveilles (7 Wonders), Jour de paie, Conquête (Risk).</p>
  <div class="foot" id="foot">Ameya Games · Salle de jeux v1.0</div>
</div>

<script>
"use strict";

// status: "play" (jouable, avec url) | "soon" (à venir)
const GAMES=[
  {name:"Yam's", fac:"jeu de dés", emoji:"🎲", accent:"#cba14a",
   desc:"La feuille de score + dés virtuels, en ligne et à tour de rôle.",
   players:"1–8", time:"20 min", online:true, status:"play", url:"./yams.html"},

  {name:"Mots de code", fac:"façon Codenames", emoji:"🕵️", accent:"#3f7fbf",
   desc:"Deux équipes, un maître-espion donne des indices pour retrouver ses mots.",
   players:"4–12", time:"15 min", online:true, status:"play", url:"./codenames.html"},

  {name:"La Mine", fac:"façon Saboteur", emoji:"⛏️", accent:"#7a5a2e",
   desc:"Chercheurs d'or contre saboteurs cachés : creusez la galerie… ou faites-la échouer.",
   players:"3–10", time:"25 min", online:true, status:"play", url:"./lamine.html"},

  {name:"Sixième carte", fac:"façon 6 qui prend", emoji:"🐂", accent:"#c46a3a",
   desc:"On pose ses cartes en même temps, pas de ramasser la 6ᵉ. Nerveux et fun.",
   players:"2–10", time:"20 min", online:true, status:"play", url:"./sixieme.html"},

  {name:"Bazar", fac:"façon Jaipur", emoji:"🐫", accent:"#c9902e",
   desc:"Duel de marchands : collecte, échange et vends au bon moment.",
   players:"2", time:"20 min", online:true, status:"soon"},

  {name:"Le Trio", fac:"façon Trio", emoji:"🔢", accent:"#6a9a54",
   desc:"Retrouve trois cartes identiques, mémoire et déduction.",
   players:"3–6", time:"15 min", online:true, status:"play", url:"./trio.html"},

  {name:"Tutti", fac:"façon Uno", emoji:"🎨", accent:"#b5433a",
   desc:"Vide ta main : couleurs, chiffres et cartes spéciales.",
   players:"2–8", time:"15 min", online:true, status:"play", url:"./tutti.html"},

  {name:"Cavale", fac:"façon Bandido", emoji:"🧱", accent:"#7a6a55",
   desc:"Coopératif : posez des tunnels pour bloquer l'évasion du prisonnier.",
   players:"1–4", time:"15 min", online:true, status:"soon"},

  {name:"La Frontière", fac:"façon Schotten Totten", emoji:"⚔️", accent:"#8a5a9a",
   desc:"Duel de bornes : place tes cartes pour remporter chaque frontière.",
   players:"2", time:"20 min", online:true, status:"soon"},

  {name:"Jour de paie", fac:"façon Bonne Paie", emoji:"💸", accent:"#3f9d6b",
   desc:"Un mois de salaire : dépenses, imprévus et fin de mois serrée.",
   players:"2–4", time:"30 min", online:true, status:"soon"},

  {name:"Les Rues", fac:"façon Monopoly", emoji:"🏙️", accent:"#2e8fa0",
   desc:"Achète, construis, encaisse les loyers, ruine les copains.",
   players:"2–6", time:"60 min", online:true, status:"play", url:"./lesrues.html"},

  {name:"Conquête", fac:"façon Risk", emoji:"🗺️", accent:"#a5463a",
   desc:"Conquête de territoires : renforts, attaques et stratégie.",
   players:"2–6", time:"60 min", online:true, status:"soon"},

  {name:"Merveilles", fac:"façon 7 Wonders", emoji:"🏛️", accent:"#b8892f",
   desc:"Bâtis ta cité en 3 âges : ressources, cartes en éventail et points de victoire.",
   players:"3–7", time:"30 min", online:true, status:"soon"},

  {name:"Le jeu des cheveux", fac:"à préciser", emoji:"💇", accent:"#c98aa0",
   desc:"Celui-là je ne le connais pas — explique-moi la règle et je le fais.",
   players:"?", time:"?", online:true, status:"soon"},
];

const ORIGINAL={
  name:"Le Grand Mix Ameya", fac:"notre jeu original", emoji:"✨",
  desc:"Un jeu maison qui pioche dans tout ce qu'on aime : indices en équipe, collecte/échange, pousse-ta-chance et un zeste de conquête. À concevoir ensemble.",
  players:"3–10", time:"~30 min", online:true, status:"soon", big:true};

const grid=document.getElementById("grid");

function card(g){
  const el=document.createElement(g.status==="play"?"a":"div");
  el.className="card "+(g.status==="play"?"playable":"soon")+(g.big?" big":"");
  el.dataset.status=g.status;
  el.style.setProperty("--accent",g.accent||"#cba14a");
  if(g.status==="play"){el.href=g.url;}
  el.innerHTML=`
    <div class="emoji">${g.emoji}</div>
    <div class="name">${g.name}</div>
    <div class="fac">${g.fac}</div>
    <div class="desc">${g.desc}</div>
    <div class="meta">
      <span class="tag">👥 ${g.players}</span>
      <span class="tag">⏱ ${g.time}</span>
      ${g.online?'<span class="tag">🌐 en ligne</span>':''}
    </div>
    <div class="status ${g.status==="play"?"play":"wait"}">${g.status==="play"?"Jouer ▶":"Bientôt"}</div>`;
  return el;
}

function render(filter){
  grid.innerHTML="";
  const show=g=> filter==="all" || g.status===filter;

  const playable=GAMES.filter(g=>g.status==="play");
  const soon=GAMES.filter(g=>g.status==="soon");

  if((filter==="all"||filter==="play") && playable.length){
    const t=document.createElement("div");t.className="section-t";t.textContent="Prêt à jouer";
    grid.appendChild(t);
    playable.forEach(g=>grid.appendChild(card(g)));
  }
  if(filter==="all"||filter==="soon"){
    const t=document.createElement("div");t.className="section-t";t.textContent="En chantier";
    grid.appendChild(t);
    soon.forEach(g=>grid.appendChild(card(g)));
    if(filter==="all"||filter==="soon") grid.appendChild(card(ORIGINAL));
  }
}

document.querySelectorAll(".chip").forEach(c=>{
  c.addEventListener("click",()=>{
    document.querySelectorAll(".chip").forEach(x=>x.classList.remove("on"));
    c.classList.add("on");
    render(c.dataset.f);
  });
});

render("all");
</script>
</body>
</html>
